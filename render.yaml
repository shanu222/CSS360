services:
  - type: web
    name: css360-app
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    # Mount persistent disk for PDF storage
    disk:
      name: css-papers-storage
      mountPath: /opt/render/project/src/CSS_Past_Papers
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false  # Set this in Render Dashboard as a secret
      - key: JWT_SECRET
        sync: false  # Set this in Render Dashboard as a secret
      - key: JWT_EXPIRES_IN
        value: 7d
